name: Validate site

on:
  push:
    branches:
      - 'agent/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repository
        uses: actions/checkout@v4

      - name: Checkout writings content
        uses: actions/checkout@v4
        with:
          repository: belleangelina/writings
          ref: main
          path: writings-content
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify site
        run: npm run verify
